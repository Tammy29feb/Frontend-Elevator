name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # Navigate to the correct project directory
            cd /home/ubuntu/Frontend-HDS/Frontend-Elevator
            
            # Pull latest code
            git checkout main
            git pull origin main
            
            # Install dependencies and build
            npm install
            npm run build
            
            # Force restart with explicit port and host binding
            pm2 delete frontend || true
            pm2 start npm --name "frontend" -- run start -- -p 3000 -H 0.0.0.0
            pm2 save
